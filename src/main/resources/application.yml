spring:
  application:
    name: pharmacy-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/pharmacy_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:pharmacy}
    password: ${SPRING_DATASOURCE_PASSWORD:pharmacy123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.pharmacy: DEBUG
    org.hibernate.SQL: INFO

cold-chain:
  alert-upgrade-interval: 60000
  category-tolerances:
    VACCINE:
      max-tolerance-minutes: 30
      extreme-temperature: 10.00
    BIOLOGICAL:
      max-tolerance-minutes: 60
      extreme-temperature: 15.00
    INSULIN:
      max-tolerance-minutes: 60
      extreme-temperature: 15.00
    NORMAL:
      max-tolerance-minutes: 120
      extreme-temperature: 25.00
  alert-thresholds:
    yellow-temp-deviation: 2.00
    yellow-humidity-deviation: 5.00
    orange-temp-deviation: 5.00
    orange-humidity-deviation: 10.00
    red-temp-deviation: 5.00
    red-humidity-deviation: 20.00
  upgrade-thresholds:
    yellow-to-orange-minutes: 10
    orange-to-red-minutes: 30
